name: tech_challenge_rt_cicd

on:
  push:
    branches: [ "main", "git_actions" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "git_actions" ]


# -----------------------------
# BUILD + TEST MATRIX
# -----------------------------
jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu (GCC)"
            os: ubuntu-latest
            profile: "profiles/ubuntu-gcc"

          - name: "Ubuntu (Clang)"
            os: ubuntu-latest
            profile: "profiles/ubuntu-clang"

          - name: "Windows (MSVC)"
            os: windows-latest
            profile: "profiles/windows-msvc"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: |
              ~/.conan2/p
              ~/.conan2/r
          key: conan-${{ runner.os }}-${{ matrix.profile }}-${{ hashFiles('conanfile.py', 'CMakeLists.txt', 'profiles/**') }}

      # -----------------------------
      # LINUX TOOLCHAINS
      # -----------------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang gcc g++

      # -----------------------------
      # MSVC TOOLCHAIN
      # -----------------------------
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # -----------------------------
      # CONAN INSTALL (UNIFIED)
      # -----------------------------
      - name: Conan install
        run: |
          conan install . \
            --build=missing \
            -s build_type=Release \
            --profile:host=${{ matrix.profile }} \
            --profile:build=${{ matrix.profile }}

      # -----------------------------
      # CMAKE CONFIGURE
      # -----------------------------
      - name: Configure CMake
        run: cmake --preset conan-release

      # -----------------------------
      # BUILD
      # -----------------------------
      - name: Build
        run: cmake --build --preset conan-release

      # -----------------------------
      # TEST
      # -----------------------------
      - name: Test
        run: ctest --preset conan-release --output-on-failure

      # -----------------------------
      # PACKAGE
      # -----------------------------
      - name: Package with CPack
        run: cmake --build --preset conan-release --target package

      # -----------------------------
      # UPLOAD ARTIFACTS
      # -----------------------------
      - name: Upload CPack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cpack-${{ matrix.name }}
          path: |
            build/**/*.tar.gz
            build/**/*.zip


  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Conan install for linting
        run: |
          conan install . \
            --build=missing \
            -s build_type=Release \
            --profile:host=profiles/ubuntu-gcc \
            --profile:build=profiles/ubuntu-gcc

      - name: Configure CMake for linting
        run: cmake --preset conan-release -DRUN_CLANG_TIDY=ON -DENABLE_FORMAT_CHECK=ON

      - name: Run clang-tidy
        run: cmake --build --preset conan-release --target format-check

# -----------------------------
# RELEASE JOB (ONLY ON TAGS)
# -----------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-test

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: artifacts/**/*.zip,artifacts/**/*.tar.gz
          allowUpdates: true